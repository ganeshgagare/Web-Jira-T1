# Server
server.port=${PORT:8080}

# Database - Railway uses DATABASE_URL, local uses individual vars
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Ganesh@2003}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:3a8f2c1d9e6b4a7f0c5d2e8b1a4f7c0d3e6b9a2f5c8d1e4b7a0c3f6d9e2b5a8}
jwt.expiration=86400000

# CORS - allow Railway frontend
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
